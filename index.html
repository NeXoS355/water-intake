<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/water-glas.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
<body>

<div class="container">
  <header class="header">
    <h1>Mein Tages-Wasserlogbuch</h1>
    <div class="header-buttons">
      <button type="button" id="notifications" onclick="enableNotifications()">Benachrichtigungen</button>
      <button type="button" id="reset" onclick="clearStorage()">Reset</button>
    </div>
  </header>

  <main class="main-content">
    <section class="input-section">
      <div class="input-row">
        <label>Datum: <input type="date" id="datum" value=""></label>
      </div>
      <div class="input-row">
        <label>Uhrzeit: <input type="time" id="uhrzeit" value=""></label>
      </div>
      <div class="input-row">
        <label>Tagesbedarf [ml]: <input type="number" id="DailyGoal"></label>
        <button type="button" id="goal" onclick="changeGoal()">Speichern</button>
      </div>
    </section>

    <section class="water-section">
      <div class="water-buttons">
        <button type="button" class="water-btn" onclick="addWasser(200)">+ 200 ml</button>
        <button type="button" class="water-btn" onclick="addWasser(300)">+ 300 ml</button>
        <button type="button" class="water-btn" onclick="addWasser(400)">+ 400 ml</button>
        <button type="button" class="water-btn" onclick="addWasser(500)">+ 500 ml</button>
      </div>

      <div class="status-section">
        <div class="water-fill" id="waterFill"></div>
        <div class="water-total">
          <span id="total">0</span>
          <span class="unit">ml</span>
        </div>
      </div>
    </section>
  </main>

  <section class="charts-section" id="canvas">
    <div class="chart" id="chart">
      <canvas id="myChart0"></canvas>
      <p class="chart-date"><span id="desc0"></span></p>
      <p class="chart-val"><span id="val0"></span></p>
    </div>
    <div class="chart" id="chart">
      <canvas id="myChart1"></canvas>
      <p class="chart-date"><span id="desc1"></span></p>
      <p class="chart-val"><span id="val1"></span></p>
    </div>
    <div class="chart" id="chart">
      <canvas id="myChart2"></canvas>
      <p class="chart-date"><span id="desc2"></span></p>
      <p class="chart-val"><span id="val2"></span></p>
    </div>
    <div class="chart" id="chart">
      <canvas id="myChart3"></canvas>
      <p class="chart-date"><span id="desc3"></span></p>
      <p class="chart-val"><span id="val3"></span></p>
    </div>
    <div class="chart" id="chart">
      <canvas id="myChart4"></canvas>
      <p class="chart-date"><span id="desc4"></span></p>
      <p class="chart-val"><span id="val4"></span></p>
    </div>
    <div class="chart" id="chart">
      <canvas id="myChart5"></canvas>
      <p class="chart-date"><span id="desc5"></span></p>
      <p class="chart-val"><span id="val5"></span></p>
    </div>
    <div class="chart" id="chart">
      <canvas id="myChart6"></canvas>
      <p class="chart-date"><span id="desc6"></span></p>
      <p class="chart-val"><span id="val6"></span></p>
    </div>
  </section>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="./logic.js" type="module"></script>

</body>
</html>
