<!DOCTYPE html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tägliche Wasseraufnahme tracken und Trinkziele erreichen">
    <meta name="theme-color" content="#0B0F19">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Mein Tages-Wasserlogbuch</title>
  </head>
<body>

<div class="container">
  <header class="header">
    <h1>Mein Tages-Wasserlogbuch <span>Hydration Tracker</span></h1>
    <div class="header-buttons">
      <button type="button" id="reset" aria-label="Alle Daten zurücksetzen"><i class="fa-solid fa-trash-can"></i></button>
    </div>
  </header>

  <main class="main-content">
    <!-- Water Glass Visualization -->
    <section class="glass-section">
      <div class="glass" role="img" aria-label="Wasserglas-Füllstandsanzeige">
        <div class="glass-body">
          <div class="water-fill" id="waterFill">
            <div class="wave"></div>
          </div>
        </div>
        <div id="glassMarkers" aria-hidden="true"></div>
      </div>
      <div class="water-total" aria-live="polite" aria-label="Heutige Trinkmenge">
        <span id="total">0</span>
        <span class="unit">ml</span>
      </div>
      <div class="streak-display" id="streakDisplay" aria-live="polite">
        <i class="fa-solid fa-fire" aria-hidden="true"></i>
        <span id="streakCount">0</span>
        <span class="streak-label">Tage in Folge</span>
      </div>
    </section>

    <!-- Water Amount Buttons -->
    <section class="water-section">
      <div class="water-buttons">
        <button type="button" class="water-btn" aria-label="200 Milliliter Wasser hinzufügen" data-menge="200">
          <span class="btn-amount">200</span>
          <span class="btn-unit">ml</span>
        </button>
        <button type="button" class="water-btn" aria-label="300 Milliliter Wasser hinzufügen" data-menge="300">
          <span class="btn-amount">300</span>
          <span class="btn-unit">ml</span>
        </button>
        <button type="button" class="water-btn" aria-label="400 Milliliter Wasser hinzufügen" data-menge="400">
          <span class="btn-amount">400</span>
          <span class="btn-unit">ml</span>
        </button>
        <button type="button" class="water-btn" aria-label="500 Milliliter Wasser hinzufügen" data-menge="500">
          <span class="btn-amount">500</span>
          <span class="btn-unit">ml</span>
        </button>
      </div>
    </section>

    <!-- Settings -->
    <section class="settings-card">
      <p class="settings-title">Einstellungen</p>
      <div class="input-section">
        <div class="input-row">
          <label><span class="label-text">Datum:</span> <input type="date" id="datum" value=""></label>
        </div>
        <div class="input-row">
          <label><span class="label-text">Uhrzeit:</span> <input type="time" id="uhrzeit" value=""></label>
        </div>
        <div class="input-row">
          <label><span class="label-text">Tagesziel [ml]:</span> <input type="number" id="DailyGoal" inputmode="numeric" pattern="[0-9]*" min="500" max="10000" step="1"></label>
          <button type="button" id="goal" aria-label="Tagesziel speichern"><i class="fa-solid fa-floppy-disk"></i></button>
        </div>
      </div>
    </section>
  </main>

  <!-- Monthly Calendar View -->
  <section class="calendar-section" id="calendarSection" aria-label="Monatliche Trinkhistorie">
    <div class="calendar-header">
      <button type="button" id="calPrev" class="cal-nav-btn" aria-label="Vorheriger Monat">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <p class="calendar-month-label" id="calMonthLabel"></p>
      <button type="button" id="calNext" class="cal-nav-btn" aria-label="Nächster Monat">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
    <div class="calendar-weekdays" aria-hidden="true">
      <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span>
      <span>Fr</span><span>Sa</span><span>So</span>
    </div>
    <div class="calendar-grid" id="calendarGrid" role="grid" aria-label="Kalender"></div>
    <div class="calendar-legend">
      <span class="legend-item"><span class="legend-dot legend-dot--goal"></span>Ziel erreicht</span>
      <span class="legend-item"><span class="legend-dot legend-dot--partial"></span>Teilweise</span>
      <span class="legend-item"><span class="legend-dot legend-dot--none"></span>Kein Eintrag</span>
    </div>
  </section>

  <div class="version-toggle">
    <span class="toggle-label" id="label-light">Light</span>
    <button type="button" class="toggle-track active" id="theme-toggle" aria-label="Theme wechseln">
      <span class="toggle-knob"></span>
    </button>
    <span class="toggle-label active" id="label-dark">Dark</span>
  </div>
</div>

<div id="dayModal" class="day-modal" aria-hidden="true">
  <div class="day-modal-backdrop"></div>
  <div class="day-modal-sheet" role="dialog" aria-modal="true" aria-labelledby="dayModalDate">
    <div class="day-modal-handle" aria-hidden="true"></div>
    <p class="day-modal-date" id="dayModalDate"></p>
    <div class="day-modal-summary">
      <span class="day-modal-amount" id="dayModalAmount"></span>
      <span class="day-modal-goal-text" id="dayModalGoalText"></span>
    </div>
    <div class="day-modal-bar-track" aria-hidden="true">
      <div class="day-modal-bar-fill" id="dayModalBarFill"></div>
    </div>
    <div class="day-modal-entries" id="dayModalEntries"></div>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="./logic.js" type="module"></script>

</body>
</html>
